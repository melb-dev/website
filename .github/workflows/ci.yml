name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: '1.3.6' }
      - run: bun install --frozen-lockfile
      - run: make precommit
      - run: make build
